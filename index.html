<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ventanita de Chavela - App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="header-contenido">
            <img src="pictures/icono.png" alt="Logo" class="img-logo-header">
            <div class="header-texto">
                <h1>Ventanita de Chavela</h1>
                <p>Sabor casero en un toque 🌯</p>
            </div>
        </div>
    </header>

    <div class="categorias-container">
        <button id="btn-todo" class="btn-categoria active" onclick="cambiarMenu('todo', this)">Menú General</button>
        <button id="btn-estudiantil" class="btn-categoria" onclick="cambiarMenu('estudiantil', this)">Estudiantil 🎓</button>
    </div>

    <main id="menu">
        <div class="seccion-carrusel">
            <div class="carrusel-header">
                <h2 id="titulo-seccion">Populares 🔥</h2>
            </div>
            
            <div id="carrusel-dinamico" class="carrusel-horizontal"></div>
        </div>
    </main>

    <div id="modal-detalle" class="modal-detalle-full"></div>

    <div id="modal-carrito" class="modal-carrito">
        <div class="carrito-header">
            <button class="btn-atras-carrito" onclick="cerrarCarrito()">← Atras</button>
            <h2>Tu Pedido</h2>
            <span></span> </div>

        <div id="items-carrito-contenedor">
            </div>

        <div class="carrito-footer">
            <div class="total-fila">
                <span>Total a pagar:</span>
                <span class="total-precio">₡<span id="total-precio-carrito">0</span></span>
            </div>
            <button class="btn-confirmar" onclick="enviarWhatsApp()">Confirmar por WhatsApp 📱</button>
        </div>
    </div>

    <div id="btn-carrito-flotante" onclick="abrirCarrito()">
        🛒 <span id="contador-carrito">0</span>
    </div>

    <script src="app.js"></script>
</body>
</html>
