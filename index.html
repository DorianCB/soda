<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ventanita de Chavela - Pedidos</title>
    <link rel="icon" type="image/png" href="pictures/icono.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="header-contenido">
            <img src="pictures/icono.png" alt="Logo Chavela" class="img-logo-header">
            <div class="header-texto">
                <h1>Ventanita de Chavela</h1>
                <p>Pedí por aquí y solo pasá a recoger 🌯</p>
            </div>
        </div>
    </header>

    <div class="categorias-container">
        <button class="btn-categoria active" onclick="filtrarMenu('todo', this)">Menú General</button>
        <button class="btn-categoria" onclick="filtrarMenu('estudiantil', this)">Estudiantil 🎓</button>
    </div>

    <main id="menu" class="grid-menu">
        <div class="producto-card">
            <div class="imagen-contenedor">
                <img src="pictures/casado.png" alt="Casado">
                <button class="btn-flotante-agregar" onclick="agregarDirecto('Casado Completo', 3500, 'pictures/casado.png')">+</button>
            </div>
            <div class="info-card">
                <h3>Casado Completo</h3>
                <p class="precio">₡3500</p>
            </div>
        </div>

        <div class="producto-card estudiantil">
            <div class="imagen-contenedor">
                <img src="pictures/empanada.png" alt="Empanada">
                <button class="btn-flotante-agregar" onclick="abrirOpciones('Empanada Especial', 1000, 'pictures/empanada.png')">+</button>
            </div>
            <div class="info-card">
                <h3>Empanada Estudiantil</h3>
                <p class="precio">₡1000</p>
            </div>
        </div>
    </main>

    <div id="btn-carrito-flotante" onclick="abrirCarrito()">
        🛒 <span id="contador-carrito">0</span>
    </div>

    <div id="modal-opciones" class="modal">...</div>
    <div id="modal-carrito" class="modal">...</div>

    <script src="app.js"></script>
</body>
</html>
