<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ventanita de Chavela - Pedidos</title>
    <link rel="icon" type="image/png" href="pictures/icono.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="header-contenido">
            <img src="pictures/icono.png" alt="Logo Chavela" class="img-logo-header">
            <div class="header-texto">
                <h1>Ventanita de Chavela</h1>
                <p>Sabor casero en un toque 🌯</p>
            </div>
        </div>
    </header>

    <nav class="categorias-container">
        <button id="btn-todo" class="btn-categoria active" onclick="cambiarMenu('todo', this)">Menú General</button>
        <button id="btn-estudiantil" class="btn-categoria" onclick="cambiarMenu('estudiantil', this)">Estudiantil 🎓</button>
    </nav>

    <main id="menu">
        <section id="seccion-populares">
            <div class="carrusel-header">
                <h2 id="titulo-seccion">Populares 🔥</h2>
                <span class="ver-todo-btn" onclick="mostrarTodoEnGrid()">Ver todo</span>
            </div>
            <div id="carrusel-dinamico" class="carrusel-horizontal"></div>
        </section>

        <section id="seccion-todo" style="display: none;">
            <div class="grid-header">
                <h2 id="titulo-grid">Menú Completo</h2>
                <span class="ver-todo-btn" onclick="volverAlCarrusel()">← Volver</span>
            </div>
            <div id="grid-platos" class="grid-menu-completo"></div>
        </section>
    </main>

    <div id="modal-opciones" class="modal-full"></div>

    <div id="modal-carrito" class="modal-full">
        <div class="carrito-header">
            <button class="atras-btn" onclick="cerrarCarrito()">← Atrás</button>
            <h2>Tu Pedido</h2>
            <div style="width: 40px;"></div>
        </div>
        
        <div id="items-carrito-lista" class="carrito-lista"></div>

        <div class="formulario-entrega">
    <h3>Detalles de Entrega</h3>
    
    <div class="campo">
        <label>¿A nombre de quién? 👤</label>
        <input type="text" id="nombre-cliente" class="input-entrega" placeholder="Tu nombre completo">
    </div>

    <div class="campo">
        <label>¿A qué hora lo necesitas? ⏰</label>
        <input type="time" id="hora-entrega" class="input-entrega">
    </div>
    
    <div class="campo">
        <label>Ubicación o "¿Retira en local?" 📍</label>
        <textarea id="ubicacion-entrega" class="notas-area" placeholder="Ej: 200m norte de la escuela..."></textarea>
    </div>

    <div class="campo">
        <label>Método de Pago 💵</label>
        <select id="metodo-pago" class="select-personalizado">
            <option value="SINPE Móvil">SINPE Móvil</option>
            <option value="Efectivo">Efectivo</option>
            <option value="Tarjeta">Tarjeta (Datáfono)</option>
        </select>
    </div>
</div>

        <div class="carrito-footer">
            <div class="total-contenedor">
                <span>Total:</span>
                <span class="total-monto">₡<span id="monto-total">0</span></span>
            </div>
            <button class="confirmar-btn" onclick="enviarWhatsApp()">Confirmar Pedido 📱</button>
        </div>
    </div>

    <div id="btn-carrito-flotante" onclick="abrirCarrito()">
        🛒 <span id="contador-badge">0</span>
    </div>

    <script src="app.js"></script>
</body>
</html>
