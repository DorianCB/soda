<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba Carrusel - Chavela</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="header-contenido">
            <img src="pictures/icono.png" alt="Logo" class="img-logo-header">
            <div class="header-texto">
                <h1>Ventanita de Chavela</h1>
                <p>Menú de Prueba 🌯</p>
            </div>
        </div>
    </header>

    <div class="categorias-container">
        <button class="btn-categoria active">Menú General</button>
        <button class="btn-categoria">Estudiantil 🎓</button>
    </div>

    <main id="menu">
        <div class="seccion-carrusel">
            <div class="carrusel-header">
                <h2>Populares 🔥</h2>
                <span class="ver-todo">Ver todo</span>
            </div>
            
            <div class="carrusel-horizontal">
                
                <div class="card-carrusel">
                    <img src="pictures/empanada.png" alt="Plato">
                    <div class="precio-tag">₡1000</div>
                    <div class="info-min">
                        <h3>Empanada de Carne</h3>
                    </div>
                </div>

                <div class="card-carrusel">
                    <img src="pictures/casado.png" alt="Plato">
                    <div class="precio-tag">₡3500</div>
                    <div class="info-min">
                        <h3>Casado de la Casa</h3>
                    </div>
                </div>

                <div class="card-carrusel">
                    <img src="pictures/empanada.png" alt="Plato">
                    <div class="precio-tag">₡1200</div>
                    <div class="info-min">
                        <h3>Empanada de Pollo</h3>
                    </div>
                </div>

                <div class="card-carrusel">
                    <img src="pictures/casado.png" alt="Plato">
                    <div class="precio-tag">₡2500</div>
                    <div class="info-min">
                        <h3>Medio Casado</h3>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
